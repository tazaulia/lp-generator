<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CuanMania - Landing Page Generator</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (localStorage.getItem('cuanmania-theme') === 'dark' ||
          (!localStorage.getItem('cuanmania-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
